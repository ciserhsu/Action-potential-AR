<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>生理学AR - 比例0.17版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        /* 这是一个覆盖全屏的透明按钮，点哪里都能唤醒 */
        #click-to-start {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); color: white;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; font-size: 20px; font-weight: bold;
        }
        #monitor-box { position: fixed; top: 10px; left: 10px; width: 170px; height: 110px; background: rgba(0,0,0,0.8); border: 2px solid #00ff00; border-radius: 8px; z-index: 1001; }
        #v-display { position: absolute; top: 4px; right: 10px; color: #00ff00; font-family: monospace; font-size: 15px; font-weight: bold; }
        #wave-canvas { width: 100%; height: 100%; }
        .controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1001; display: flex; gap: 8px; }
        button { padding: 12px 14px; border-radius: 10px; border: none; font-weight: bold; color: white; font-size: 13px; }
        .btn-na { background: #ff4444; } .btn-k { background: #4444ff; } .btn-rec { background: #4caf50; }
    </style>
</head>

<body>
    <div id="click-to-start" onclick="startEverything()">
        【点击屏幕开启摄像头】
    </div>

    <div id="monitor-box">
        <div id="v-display">-70 mV</div>
        <canvas id="wave-canvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn-na" onclick="startDepol()">1. 去极化</button>
        <button class="btn-k" onclick="startRepol()">2. 复极化</button>
        <button class="btn-rec" onclick="startRecovery()">3. 恢复期</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker type="pattern" url="./pattern-image_0528fe.patt">
            <a-entity position="0 0 0" scale="0.17 0.17 0.17">
                <a-text value="OUTSIDE" position="0 2.8 0" align="center" color="#00ffff" width="10" rotation="-90 0 0"></a-text>
                <a-box position="0 0 0" width="6" height="0.2" depth="2.5" color="#f5d6ba">
                    <a-cylinder position="-1.8 0 0" radius="0.45" height="0.5" color="#ff4444">
                        <a-text value="Na+" position="0 0.6 0" align="center" width="6" rotation="-90 0 0"></a-text>
                    </a-cylinder>
                    <a-cylinder position="1.8 0 0" radius="0.45" height="0.5" color="#4444ff">
                        <a-text value="K+" position="0 0.6 0" align="center" width="6" rotation="-90 0 0"></a-text>
                    </a-cylinder>
                </a-box>
                <a-text value="INSIDE" position="0 -2.8 0" align="center" color="#ff00ff" width="10" rotation="-90 0 0"></a-text>
            </a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // 关键：必须由点击事件触发唤醒
        async function startEverything() {
            try {
                // 用刚才测试成功的逻辑唤醒
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                // 唤醒后关掉遮罩层
                document.getElementById('click-to-start').style.display = 'none';
                // 强制 AR 引擎对齐画面
                setTimeout(() => { window.dispatchEvent(new Event('resize')); }, 300);
            } catch (err) {
                alert("启动失败，请检查设置：" + err.name);
            }
        }

        // 示波器逻辑
        const canvas = document.getElementById('wave-canvas');
        const ctx = canvas.getContext('2d');
        const vDisp = document.getElementById('v-display');
        let points = [{x: 5, y: 95}]; let v = -70; let active = false; let done = false;
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
            for(let p of points) ctx.lineTo(p.x, p.y);
            ctx.stroke();
            let last = points[points.length-1];
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(last.x, last.y, 4, 0, Math.PI*2); ctx.fill();
        }
        function startDepol() {
            if(active) return;
            if(done || points.length > 45) { points = [{x: 5, y: 95}]; v = -70; done = false; draw(); }
            active = true;
            let timer = setInterval(() => {
                v += 5; points.push({x: points[points.length-1].x + 3, y: 95 - ((v+70)*0.75)});
                vDisp.innerText = Math.min(30, v) + " mV"; draw();
                if(v >= 30) { clearInterval(timer); active = false; }
            }, 50);
        }
        canvas.width = 170; canvas.height = 110; draw();
    </script>
</body>
</html>
