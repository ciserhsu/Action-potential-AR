<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>AR摄像头强制启动版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #video-container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 1; }
        #ar-container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 2; pointer-events: none; }
        #debug { position: fixed; top: 10px; right: 10px; color: #00ff00; z-index: 10; font-family: monospace; }
    </style>
</head>
<body>
    <div id="debug">初始化中...</div>
    <div id="video-container"></div>
    <div id="ar-container"></div>

    <!-- 先手动加载视频流，再挂载到AR.js -->
    <script>
        // 第一步：强制请求摄像头权限，手动渲染视频流
        async function initCamera() {
            try {
                // 强制请求后置摄像头
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: 'environment' },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });

                // 创建视频元素，手动渲染摄像头画面
                const video = document.createElement('video');
                video.id = 'camera-video';
                video.width = window.innerWidth;
                video.height = window.innerHeight;
                video.autoplay = true;
                video.muted = true;
                video.playsInline = true; // 关键：iOS必须加这个
                video.srcObject = stream;
                document.getElementById('video-container').appendChild(video);

                document.getElementById('debug').innerText = "摄像头已启动";
                return video;
            } catch (err) {
                document.getElementById('debug').innerText = "摄像头启动失败：" + err.message;
                console.error(err);
                throw err;
            }
        }

        // 第二步：加载AR.js并挂载视频流
        async function initAR(video) {
            // 动态加载AFRAME和AR.js（避免预加载冲突）
            const loadScript = (url) => new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = url;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });

            // 按顺序加载依赖
            await loadScript('https://aframe.io/releases/1.2.0/aframe.min.js');
            await loadScript('https://cdn.jsdelivr.net/npm/ar.js@2.3.0/aframe/build/aframe-ar.js');

            // 等待AR.js初始化
            await new Promise(resolve => setTimeout(resolve, 500));

            // 创建AR场景
            const arScene = document.createElement('a-scene');
            arScene.setAttribute('embedded', '');
            arScene.setAttribute('arjs', `
                sourceType: webcam;
                debugUIEnabled: false;
                videoTexture: false; // 不使用AR.js的视频纹理，用我们手动的
            `);
            document.getElementById('ar-container').appendChild(arScene);

            // 添加Marker和3D元素
            const marker = document.createElement('a-marker');
            marker.setAttribute('type', 'pattern');
            marker.setAttribute('url', './pattern-image_0528fe.patt');
            arScene.appendChild(marker);

            const cube = document.createElement('a-box');
            cube.setAttribute('position', '0 0 0');
            cube.setAttribute('width', '1');
            cube.setAttribute('height', '1');
            cube.setAttribute('depth', '1');
            cube.setAttribute('color', 'red');
            marker.appendChild(cube);

            // 添加摄像头
            const camera = document.createElement('a-entity');
            camera.setAttribute('camera', '');
            arScene.appendChild(camera);

            // 覆盖AR.js的视频源为我们手动启动的视频
            setTimeout(() => {
                const arSystem = arScene.systems.arjs;
                if (arSystem && arSystem.source) {
                    arSystem.source.domElement = video;
                    document.getElementById('debug').innerText = "AR已加载";
                }
            }, 1000);
        }

        // 启动流程
        window.onload = async () => {
            try {
                const video = await initCamera();
                await initAR(video);
            } catch (err) {
                document.getElementById('debug').innerText = "初始化失败：" + err.message;
            }
        };
    </script>
</body>
</html>
