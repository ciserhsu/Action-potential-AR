<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄像头硬件测试</title>
    <style>
        body { margin: 0; background: #000; color: white; text-align: center; font-family: sans-serif; }
        video { width: 100%; height: auto; background: #222; }
        #info { padding: 20px; font-size: 14px; color: #0f0; }
        .error { color: #ff4444; }
    </style>
</head>
<body>

    <div id="info">正在尝试调用后置摄像头...</div>
    
    <video id="video" autoplay playsinline></video>

    <script>
        async function startCamera() {
            const videoElement = document.getElementById('video');
            const infoElement = document.getElementById('info');

            const constraints = {
                video: {
                    // 强制调用后置摄像头
                    facingMode: { exact: "environment" }
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = stream;
                infoElement.innerText = "后置摄像头启动成功！";
            } catch (err) {
                console.error("后置失败，尝试普通模式:", err);
                
                // 如果强制后置报错，尝试不限制方向的普通模式
                try {
                    const flexibleStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    videoElement.srcObject = flexibleStream;
                    infoElement.innerText = "普通模式启动成功（可能调用了前置）";
                } catch (finalErr) {
                    infoElement.innerHTML = `<span class="error">启动失败: ${finalErr.name}<br>${finalErr.message}</span>`;
                }
            }
        }

        // 页面加载完成即刻触发
        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
