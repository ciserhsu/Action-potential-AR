<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>生理学AR - 摄像头优先版</title>
    <!-- 仅保留核心依赖，和极简版完全一致 -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@2.3.0/aframe/build/aframe-ar.js"></script>
    <style>
        /* 仅保留必要样式，避免任何可能的干扰 */
        body { margin: 0; overflow: hidden; }
        /* 临时隐藏所有UI，先确保摄像头能出画面 */
        #monitor-box, .controls { display: none !important; }
    </style>
</head>
<body>
    <!-- 先隐藏所有自定义UI，只保留AR核心 -->
    <div id="monitor-box">
        <div id="v-display">-70 mV</div>
        <canvas id="wave-canvas"></canvas>
    </div>
    <div class="controls">
        <button class="btn-na" onclick="startDepol()">1. 去极化</button>
        <button class="btn-k" onclick="startRepol()">2. 复极化</button>
        <button class="btn-rec" onclick="startRecovery()">3. 恢复期</button>
    </div>

    <!-- AR场景：和极简版完全一致（能运行的核心） -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker type="pattern" url="./pattern-image_0528fe.patt">
            <a-box position="0 0 0" width="1" height="1" depth="1" color="red"></a-box>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // 无任何自定义JS，先保证摄像头启动
    </script>
</body>
</html>
