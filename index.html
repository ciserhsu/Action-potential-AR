<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <!-- 关键修复1：添加安全策略元标签，允许摄像头访问 -->
    <meta http-equiv="Content-Security-Policy" content="default-src *; script-src * 'unsafe-inline'; style-src * 'unsafe-inline'; media-src * blob:; connect-src *">
    <title>生理学AR - 最终修复版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <!-- 关键修复2：使用稳定版AR.js CDN，避免raw.githack的兼容性问题 -->
    <script src="https://cdn.jsdelivr.net/npm/ar.js@2.3.0/aframe/build/aframe-ar-nft.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #monitor-box { position: fixed; top: 10px; left: 10px; width: 170px; height: 110px; background: rgba(0,0,0,0.8); border: 2px solid #00ff00; border-radius: 8px; z-index: 1001; }
        #v-display { position: absolute; top: 4px; right: 10px; color: #00ff00; font-family: monospace; font-size: 15px; font-weight: bold; }
        #wave-canvas { width: 100%; height: 100%; }
        .controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1001; display: flex; gap: 8px; }
        button { padding: 12px 14px; border-radius: 10px; border: none; font-weight: bold; color: white; cursor: pointer; font-size: 13px; }
        .btn-na { background: #ff4444; } .btn-k { background: #4444ff; } .btn-rec { background: #4caf50; }
        /* 临时显示加载界面，方便调试 */
        .arjs-loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; text-align: center; color: white; }
    </style>
</head>

<body>
    <!-- 恢复AR.js加载界面，便于调试 -->
    <div class="arjs-loader">
        <p>正在启动摄像头...</p>
        <canvas width="200" height="200"></canvas>
    </div>

    <div id="monitor-box">
        <div id="v-display">-70 mV</div>
        <canvas id="wave-canvas"></canvas>
    </div>

    <div class="controls">
        <button class="btn-na" onclick="startDepol()">1. 去极化</button>
        <button class="btn-k" onclick="startRepol()">2. 复极化</button>
        <button class="btn-rec" onclick="startRecovery()">3. 恢复期</button>
    </div>

    <!-- 关键修复3：完善AR.js配置，指定后置摄像头、分辨率、关闭调试 -->
    <a-scene 
        embedded 
        arjs="
            sourceType: webcam;
            videoTexture: true;
            videoWidth: 1280;
            videoHeight: 720;
            facingMode: environment;
            debugUIEnabled: false;
            detectionMode: mono_and_matrix;
            matrixCodeType: 3x3;
        "
    >
        <a-marker type="pattern" url="./pattern-image_0528fe.patt">
            <a-entity position="0 0 0" scale="0.17 0.17 0.17">
                <a-text value="OUTSIDE" position="0 2.8 0" align="center" color="#00ffff" width="10" rotation="-90 0 0"></a-text>
                <a-box position="0 0 0" width="6" height="0.2" depth="2.5" color="#f5d6ba">
                    <a-cylinder position="-1.8 0 0" radius="0.45" height="0.5" color="#ff4444">
                        <a-text value="Na+" position="0 0.6 0" align="center" width="6" rotation="-90 0 0"></a-text>
                    </a-cylinder>
                    <a-cylinder position="1.8 0 0" radius="0.45" height="0.5" color="#4444ff">
                        <a-text value="K+" position="0 0.6 0" align="center" width="6" rotation="-90 0 0"></a-text>
                    </a-cylinder>
                </a-box>
                <a-text value="INSIDE" position="0 -2.8 0" align="center" color="#ff00ff" width="10" rotation="-90 0 0"></a-text>

                <a-entity id="na-ani" visible="false">
                    <a-sphere position="-1.8 2 0" radius="0.15" color="#00fbff" animation="property: position; from: -1.8 2 0; to: -1.8 -2 0; dur: 800; loop: true"></a-sphere>
                </a-entity>
                <a-entity id="k-ani" visible="false">
                    <a-sphere position="1.8 -2 0" radius="0.15" color="#00ff00" animation="property: position; from: 1.8 -2 0; to: 1.8 2 0; dur: 800; loop: true"></a-sphere>
                </a-entity>
            </a-entity>
        </a-marker>

        <a-entity camera look-controls="enabled: false"></a-entity>
    </a-scene>

    <script>
        // 关键修复4：重构摄像头初始化逻辑，确保AR场景加载完成后再请求权限
        document.addEventListener('DOMContentLoaded', async function() {
            // 等待AR.js初始化完成
            await new Promise(resolve => {
                const checkAR = setInterval(() => {
                    if (window.ARjs && document.querySelector('a-scene').systems.arjs) {
                        clearInterval(checkAR);
                        resolve();
                    }
                }, 100);
            });

            try {
                // 请求后置摄像头权限
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: { exact: 'environment' }, // 强制后置摄像头
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });

                // 将流绑定到AR场景
                const arSystem = document.querySelector('a-scene').systems.arjs;
                if (arSystem && arSystem.source) {
                    arSystem.source.domElement.srcObject = stream;
                    arSystem.source.domElement.play();
                }

                // 触发resize确保画面适配
                setTimeout(() => {
                    window.dispatchEvent(new Event('resize'));
                }, 300);

                console.log("摄像头初始化成功");
            } catch (err) {
                console.error("摄像头初始化失败:", err);
                alert("无法访问摄像头！请检查：1.是否授予权限 2.是否使用HTTPS 3.浏览器是否支持");
            }
        });

        // --- 示波器绘制逻辑 (保持原样) ---
        const canvas = document.getElementById('wave-canvas');
        const ctx = canvas.getContext('2d');
        const vDisp = document.getElementById('v-display');
        let points = [{x: 5, y: 95}]; let v = -70; let active = false; let done = false;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
            for(let p of points) ctx.lineTo(p.x, p.y);
            ctx.stroke();
            let last = points[points.length-1];
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(last.x, last.y, 4, 0, Math.PI*2); ctx.fill();
        }

        function startDepol() {
            if(active) return;
            if(done || points.length > 45) { points = [{x: 5, y: 95}]; v = -70; done = false; draw(); }
            active = true;
            document.getElementById('na-ani').setAttribute('visible', 'true');
            let timer = setInterval(() => {
                v += 5; points.push({x: points[points.length-1].x + 3, y: 95 - ((v+70)*0.75)});
                vDisp.innerText = Math.min(30, v) + " mV"; draw();
                if(v >= 30) { clearInterval(timer); active = false; }
            }, 50);
        }

        function startRepol() {
            if(active || v < 30) return;
            active = true;
            document.getElementById('na-ani').setAttribute('visible', 'false');
            document.getElementById('k-ani').setAttribute('visible', 'true');
            let timer = setInterval(() => {
                v -= 5; points.push({x: points[points.length-1].x + 3, y: 95 - ((v+70)*0.75)});
                vDisp.innerText = v + " mV"; draw();
                if(v <= -80) { clearInterval(timer); active = false; }
            }, 50);
        }

        function startRecovery() {
            if(active || v != -80) return;
            active = true;
            document.getElementById('k-ani').setAttribute('visible', 'false');
            let timer = setInterval(() => {
                v += 1; points.push({x: points[points.length-1].x + 3, y: 95 - ((v+70)*0.75)});
                vDisp.innerText = v + " mV"; draw();
                if(v >= -70) { clearInterval(timer); active = false; done = true; }
            }, 100);
        }
        canvas.width = 170; canvas.height = 110; draw();
    </script>
</body>
</html>
